<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบค้นหาอัตราค่านำหมาย (ข้อมูลสำรอง)</title>
    <!-- นำเข้า Bootstrap เพื่อความสวยงามและจัด Layout -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- นำเข้า SweetAlert2 สำหรับแจ้งเตือน -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .container { max-width: 900px; margin-top: 50px; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .table-responsive { max-height: 500px; overflow-y: auto; }
        thead { position: sticky; top: 0; background-color: #0d6efd; color: white; z-index: 1; }
    </style>
</head>
<body>

<div class="container">
    <h2 class="text-center mb-4">🔍 ระบบค้นหาอัตราค่านำหมาย (ระบบสำรอง)</h2>
    
    <!-- ช่องค้นหา -->
    <div class="input-group mb-4">
        <input type="text" id="searchInput" class="form-control form-control-lg" placeholder="พิมพ์ชื่อศาล, จังหวัด, เขต หรือ แขวง...">
        <button class="btn btn-primary px-4" onclick="searchData()">ค้นหา</button>
    </div>

    <!-- แสดงจำนวนรายการ -->
    <div class="mb-2 text-muted" id="resultCount"></div>

    <!-- ตารางแสดงผล -->
    <div class="table-responsive">
        <table class="table table-bordered table-hover">
            <thead>
                <tr>
                    <th>ศาล</th>
                    <th>จังหวัด</th>
                    <th>อำเภอ/เขต</th>
                    <th>ตำบล/แขวง</th>
                    <th>อัตรา (บาท)</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- ข้อมูลจะถูกดึงมาแสดงตรงนี้ -->
            </tbody>
        </table>
    </div>
</div>

<script>
    // 🔴 นำ URL ของ Web App จาก Google Apps Script มาใส่ที่นี่ 🔴
    const API_URL = "https://script.google.com/macros/s/AKfycbyio1zeacR3PRwpdjtkie7_F5w46Sw41N0mj0RL30Ep-Movx1ybeaS2MlYp1ftaIQALcg/exec";

    // ฟังก์ชันค้นหาข้อมูล
    function searchData() {
        // ดึงข้อความที่พิมพ์ และตัดช่องว่างซ้ายขวาออก (trim)
        const keyword = document.getElementById("searchInput").value.trim();
        
        // 1. ตรวจสอบว่าผู้ใช้พิมพ์ข้อความหรือยัง
        if (keyword === "") {
            Swal.fire({
                icon: 'warning',
                title: 'แจ้งเตือน',
                text: 'กรุณาพิมพ์ชื่อศาล หรือเขต/อำเภอ ที่ต้องการค้นหาก่อนครับ'
            });
            return; // หยุดการทำงาน ไม่ส่ง Request ไปที่ Google Sheet
        }
        
        // เรียกใช้ SweetAlert2 แสดงสถานะโหลด
        Swal.fire({
            title: 'กำลังค้นหาข้อมูล...',
            allowOutsideClick: false,
            didOpen: () => {
                Swal.showLoading();
            }
        });

        // ดึงข้อมูลจาก Google Sheets ผ่าน Web App API เฉพาะคำที่ค้นหา
        fetch(API_URL + "?q=" + encodeURIComponent(keyword))
            .then(response => response.json())
            .then(data => {
                Swal.close(); // ปิดหน้าต่างโหลด
                
                const tableBody = document.getElementById("tableBody");
                tableBody.innerHTML = ""; // ล้างข้อมูลเก่า
                
                if (data.status === "success" && data.data && data.data.length > 0) {
                    document.getElementById("resultCount").innerText = "พบข้อมูลทั้งหมด " + data.total + " รายการ";
                    
                    // วนลูปสร้างแถวตาราง
                    data.data.forEach(item => {
                        let row = `<tr>
                            <td>${item.court_name || '-'}</td>
                            <td>${item.prov_name || '-'}</td>
                            <td>${item.amphur_name || '-'}</td>
                            <td>${item.tambon_name || '-'}</td>
                            <td class="text-primary fw-bold">${item.amtsentnotice || '0'}</td>
                        </tr>`;
                        tableBody.innerHTML += row;
                    });
                } else if (data.status === "error") {
                    // กรณีฝั่ง Google Sheet แจ้ง Error กลับมา
                    document.getElementById("resultCount").innerText = "";
                    Swal.fire('ข้อผิดพลาดจากฐานข้อมูล', data.message, 'error');
                } else {
                    document.getElementById("resultCount").innerText = "";
                    tableBody.innerHTML = `<tr><td colspan="5" class="text-center text-danger">ไม่พบข้อมูลที่ตรงกับ "${keyword}"</td></tr>`;
                }
            })
            .catch(error => {
                Swal.close();
                Swal.fire('ข้อผิดพลาด!', 'ไม่สามารถเชื่อมต่อฐานข้อมูลได้', 'error');
                console.error('Error:', error);
            });
    }

    // 2. ปิดการโหลดข้อมูลอัตโนมัติ (ลบคำสั่ง window.onload เดิมออก)
    // การปล่อยว่างไว้จะทำให้หน้าเว็บเริ่มต้นมาแบบคลีนๆ รอให้คนกดปุ่มค้นหาเอง

    // 3. เพิ่มความสะดวก: ให้กดปุ่ม Enter ที่คีย์บอร์ดเพื่อค้นหาได้เลย ไม่ต้องใช้เมาส์คลิกปุ่ม
    document.getElementById("searchInput").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            searchData();
        }
    });
</script>

</body>
</html>
